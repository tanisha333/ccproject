<!DOCTYPE html>
<html>
<head>
<title>Lavender Auth</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-r from-purple-500 to-indigo-600">

<div class="bg-white p-8 rounded-2xl shadow-xl w-80">

<h2 id="title" class="text-2xl font-bold text-center text-purple-700 mb-4">Login</h2>

<input id="email" placeholder="Email"
class="w-full p-2 border rounded mb-3">

<input id="password" type="password" placeholder="Password"
class="w-full p-2 border rounded mb-3">

<button onclick="submitForm()" id="mainBtn"
class="w-full bg-purple-600 text-white p-2 rounded hover:bg-purple-700 transition">
Login
</button>

<button onclick="googleLogin()"
class="w-full border p-2 rounded mt-3 hover:bg-gray-100">
Continue with Google
</button>

<p id="switchText" onclick="toggleMode()"
class="text-center text-sm text-purple-600 mt-4 cursor-pointer">
Switch to Signup
</p>

</div>

<script>

let isLogin = true;

function toggleMode(){
  isLogin = !isLogin;
  title.innerText = isLogin ? "Login" : "Signup";
  mainBtn.innerText = isLogin ? "Login" : "Signup";
  switchText.innerText = isLogin ? "Switch to Signup" : "Switch to Login";
}

function submitForm(){
  const url = isLogin ? "/login" : "/signup";

  fetch(url,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email: email.value,
      password: password.value
    })
  })
  .then(res => isLogin ? res.json() : res.text())
  .then(data=>{
    if(isLogin){
      if(data.success){
        localStorage.setItem("token", data.token);
        window.location.href="/homepage.html";
      }else{
        alert("Invalid login");
      }
    }else{
      alert(data);
      if(data === "Signup successful"){
        toggleMode();
      }
    }
  });
}

function googleLogin(){
  window.location.href="/auth/google";
}

</script>

</body>
</html>
