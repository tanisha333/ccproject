<!DOCTYPE html>
<html>
<head>
<title>Lavender Auth</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#f3e8ff,#e6d7ff,#d8b4fe);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
padding:35px;
width:330px;
border-radius:18px;
box-shadow:0 12px 35px rgba(0,0,0,0.15);
text-align:center;
}

h2{
color:#8b5cf6;
margin-bottom:10px;
}

input{
width:100%;
padding:11px;
margin:10px 0;
border-radius:8px;
border:1px solid #e5e7eb;
transition:0.3s;
}

input:focus{
outline:none;
border-color:#c084fc;
box-shadow:0 0 5px rgba(192,132,252,0.4);
}

button{
width:100%;
padding:11px;
background:#a78bfa;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
transition:0.3s;
}

button:hover{
background:#8b5cf6;
}

.google{
background:white;
color:#444;
border:1px solid #ddd;
}

.google:hover{
background:#f9f9f9;
}

.switch{
margin-top:15px;
color:#8b5cf6;
cursor:pointer;
font-size:14px;
}

.switch:hover{
text-decoration:underline;
}
</style>
</head>

<body>

<div class="container">

<h2 id="title">Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="submitForm()" id="mainBtn">Login</button>

<button class="google" onclick="googleLogin()">Continue with Google</button>

<div class="switch" onclick="toggleMode()" id="switchText">
Switch to Signup
</div>

</div>

<script>
let isLogin = true;

function toggleMode(){
  isLogin = !isLogin;
  title.innerText = isLogin ? "Login" : "Signup";
  mainBtn.innerText = isLogin ? "Login" : "Signup";
  switchText.innerText = isLogin ? "Switch to Signup" : "Switch to Login";
}

function submitForm(){
  const url = isLogin ? "/login" : "/signup";

  fetch(url,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email: email.value,
      password: password.value
    })
  })
  .then(res => isLogin ? res.json() : res.text())
  .then(data=>{
    if(isLogin){
      if(data.success){
        localStorage.setItem("token", data.token);
        window.location.href="/homepage.html";
      }else{
        alert("Invalid login");
      }
    }else{
      alert(data);
      if(data === "Signup successful"){
        toggleMode();
      }
    }
  });
}

function googleLogin(){
  window.location.href="/auth/google";
}
</script>

</body>
</html>
