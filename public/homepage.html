<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#fdf6ff] min-h-screen flex items-center justify-center">

<div class="bg-white w-96 p-8 rounded-3xl shadow-md border border-purple-100">

<h2 class="text-2xl font-semibold text-purple-500 mb-4">
💖 Hello Beautiful
</h2>

<div class="space-y-3 text-left">

<div class="p-3 bg-pink-50 rounded-xl">
<b>Email</b>
<p id="email"></p>
</div>

<div class="p-3 bg-purple-50 rounded-xl">
<b>Status</b>
<p id="status"></p>
</div>

<div class="p-3 bg-pink-50 rounded-xl">
<b>Auth Type</b>
<p id="auth"></p>
</div>

</div>

<div class="flex gap-3 mt-5">
<a href="/app1.html"
class="flex-1 text-center bg-purple-300 text-white p-2 rounded-xl hover:bg-purple-400">
✨ App1
</a>

<a href="/app2.html"
class="flex-1 text-center bg-pink-300 text-white p-2 rounded-xl hover:bg-pink-400">
🌸 App2
</a>
</div>

<button onclick="logout()"
class="mt-5 w-full bg-red-300 text-white p-2 rounded-xl hover:bg-red-400">
Logout
</button>

</div>

<script>

const params = new URLSearchParams(window.location.search);
let token = params.get("token");

if(token){
localStorage.setItem("token", token);
}

token = localStorage.getItem("token");

if(!token){
window.location.href="/";
}

fetch("/verify",{
headers:{Authorization:token}
})
.then(res=>res.json())
.then(data=>{
if(data){
email.innerText = data.email;
status.innerText = "Active";
auth.innerText = "Google + JWT SSO";
}else{
window.location.href="/";
}
});

function logout(){
localStorage.removeItem("token");
window.location.href="/";
}

</script>

</body>
</html>
