<!DOCTYPE html>
<html>
<head>
<title>App 2</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#e6d7ff,#c8a2ff,#a57cff);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:white;
padding:30px;
border-radius:15px;
width:320px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2{color:#7b4fd3;}

.info{
background:#f3e8ff;
padding:10px;
margin-top:15px;
border-radius:6px;
}

button{
margin-top:15px;
padding:10px;
width:100%;
background:#9b6bff;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="card">

<h2>App 2 💜</h2>

<div class="info">
<p id="email"></p>
</div>

<button onclick="goHome()">Back to Dashboard</button>

</div>

<script>

let token = localStorage.getItem("token");

if(!token){
window.location.href="/";
}

fetch("/verify",{headers:{Authorization:token}})
.then(res=>res.json())
.then(data=>{
if(data){
email.innerText = "Logged in as: " + data.email;
}else{
window.location.href="/";
}
});

function goHome(){
window.location.href="/homepage.html";
}

</script>

</body>
</html>
