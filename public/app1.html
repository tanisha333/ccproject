<!DOCTYPE html>
<html>
<head>
<title>App1</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#f3e8ff,#e6d7ff,#d8b4fe);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:white;
padding:30px;
width:300px;
border-radius:18px;
box-shadow:0 12px 35px rgba(0,0,0,0.15);
text-align:center;
}

.count{
font-size:40px;
margin:20px 0;
color:#8b5cf6;
}

button{
margin:5px;
padding:10px 15px;
background:#a78bfa;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#8b5cf6;
}
</style>
</head>

<body>

<div class="card">

<h2>🌸 App2 - Counter</h2>

<div class="count" id="count">0</div>

<button onclick="inc()">+</button>
<button onclick="dec()">-</button>

<br><br>

<button onclick="goBack()">⬅ Back</button>

</div>

<script>

let c = 0;

function inc(){
c++;
count.innerText = c;
}

function dec(){
c--;
count.innerText = c;
}

function goBack(){
window.location.href="/homepage.html";
}

</script>

</body>
</html>
