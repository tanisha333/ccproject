<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="min-h-screen bg-gradient-to-r from-purple-500 to-indigo-600 flex items-center justify-center">

<div class="bg-white p-8 rounded-2xl shadow-xl w-96 text-center">

<h2 class="text-2xl font-bold text-purple-700 mb-4">Welcome 👋</h2>

<div class="bg-purple-100 p-3 rounded mb-3">
<b>Email:</b>
<p id="email"></p>
</div>

<div class="bg-purple-100 p-3 rounded mb-3">
<b>Status:</b>
<p id="status"></p>
</div>

<div class="bg-purple-100 p-3 rounded mb-4">
<b>Auth Type:</b>
<p id="auth"></p>
</div>

<div class="flex gap-2">
<a href="/app1.html" class="w-full bg-indigo-500 text-white p-2 rounded hover:bg-indigo-600">App1</a>
<a href="/app2.html" class="w-full bg-indigo-500 text-white p-2 rounded hover:bg-indigo-600">App2</a>
</div>

<button onclick="logout()"
class="mt-4 w-full bg-red-500 text-white p-2 rounded hover:bg-red-600">
Logout
</button>

</div>

<script>

const params = new URLSearchParams(window.location.search);
let token = params.get("token");

if(token){
localStorage.setItem("token", token);
}

token = localStorage.getItem("token");

if(!token){
window.location.href="/";
}

fetch("/verify",{
headers:{Authorization:token}
})
.then(res=>res.json())
.then(data=>{
if(data){
email.innerText = data.email;
status.innerText = "Active";
auth.innerText = "Google + JWT SSO";
}else{
window.location.href="/";
}
});

function logout(){
localStorage.removeItem("token");
window.location.href="/";
}

</script>

</body>
</html>
