<!DOCTYPE html>
<html>
<head>
<title>App1</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#f3e8ff,#e6d7ff,#d8b4fe);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:white;
padding:30px;
width:320px;
border-radius:18px;
box-shadow:0 12px 35px rgba(0,0,0,0.15);
text-align:center;
}

h2{
color:#8b5cf6;
margin-bottom:20px;
}

button{
padding:10px;
width:100%;
background:#a78bfa;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#8b5cf6;
}
</style>
</head>

<body>

<div class="card">
<h2>✨ Welcome to App1</h2>

<button onclick="goBack()">⬅ Back</button>
</div>

<script>
function goBack(){
window.location.href="/homepage.html";
}
</script>

</body>
</html>
