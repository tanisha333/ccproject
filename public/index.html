<!DOCTYPE html>
<html>
<head>
<title>Lavender Auth</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#fdf6ff] min-h-screen flex items-center justify-center">

<div class="bg-white w-80 p-8 rounded-3xl shadow-md border border-purple-100">

<h2 id="title" class="text-2xl font-semibold text-center text-purple-500 mb-6">
✨ Welcome Back
</h2>

<input id="email" placeholder="Email"
class="w-full p-2 border border-purple-100 rounded-xl mb-3 focus:outline-none focus:ring-2 focus:ring-pink-200">

<input id="password" type="password" placeholder="Password"
class="w-full p-2 border border-purple-100 rounded-xl mb-4 focus:outline-none focus:ring-2 focus:ring-pink-200">

<button onclick="submitForm()" id="mainBtn"
class="w-full bg-pink-300 text-white p-2 rounded-xl hover:bg-pink-400 transition">
Login
</button>

<button onclick="googleLogin()"
class="w-full border mt-3 p-2 rounded-xl flex items-center justify-center gap-2 hover:bg-purple-50">
🌸 Continue with Google
</button>

<p id="switchText" onclick="toggleMode()"
class="text-center text-sm text-purple-400 mt-4 cursor-pointer">
Switch to Signup
</p>

</div>

<script>
let isLogin = true;

function toggleMode(){
  isLogin = !isLogin;
  title.innerText = isLogin ? "✨ Welcome Back" : "🌸 Create Account";
  mainBtn.innerText = isLogin ? "Login" : "Signup";
  switchText.innerText = isLogin ? "Switch to Signup" : "Switch to Login";
}

function submitForm(){
  const url = isLogin ? "/login" : "/signup";

  fetch(url,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email: email.value,
      password: password.value
    })
  })
  .then(res => isLogin ? res.json() : res.text())
  .then(data=>{
    if(isLogin){
      if(data.success){
        localStorage.setItem("token", data.token);
        window.location.href="/homepage.html";
      }else{
        alert("Invalid login");
      }
    }else{
      alert(data);
      if(data === "Signup successful"){
        toggleMode();
      }
    }
  });
}

function googleLogin(){
  window.location.href="/auth/google";
}
</script>

</body>
</html>
