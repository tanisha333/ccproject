<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#f3e8ff,#e6d7ff,#d8b4fe);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:30px;
border-radius:18px;
width:350px;
text-align:center;
box-shadow:0 12px 35px rgba(0,0,0,0.15);
}

h2{
color:#8b5cf6;
margin-bottom:10px;
}

.info{
margin:10px 0;
padding:10px;
background:#f5f3ff;
border-radius:8px;
}

button{
padding:10px;
background:#a78bfa;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
width:100%;
transition:0.3s;
}

button:hover{
background:#8b5cf6;
}

.link{
display:block;
margin-top:10px;
padding:10px;
background:#ede9fe;
border-radius:8px;
text-decoration:none;
color:#6d28d9;
transition:0.3s;
}

.link:hover{
background:#ddd6fe;
}
</style>

</head>

<body>

<div class="card">

<h2>Welcome 👋</h2>

<div class="info">
<b>Email:</b>
<p id="email"></p>
</div>

<div class="info">
<b>Status:</b>
<p id="status"></p>
</div>

<div class="info">
<b>Auth Type:</b>
<p id="auth"></p>
</div>

<a href="/app1.html" class="link">✨ Open App1</a>
<a href="/app2.html" class="link">🌸 Open App2</a>

<button onclick="logout()">Logout</button>

</div>

<script>

// get token from URL (after Google login)
const params = new URLSearchParams(window.location.search);
let token = params.get("token");

// save token
if(token){
localStorage.setItem("token", token);
}

// get token
token = localStorage.getItem("token");

// if not logged in
if(!token){
window.location.href="/";
}

// verify
fetch("/verify",{
headers:{Authorization:token}
})
.then(res=>res.json())
.then(data=>{
if(data){
email.innerText = data.email;
status.innerText = "Active";
auth.innerText = "Google + JWT SSO";
}else{
window.location.href="/";
}
});

// logout
function logout(){
localStorage.removeItem("token");
window.location.href="/";
}

</script>

</body>
</html>
